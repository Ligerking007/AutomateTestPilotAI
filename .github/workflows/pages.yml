name: Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download CI report artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          name: automate-test-pilot-ai-reports
          path: .
          if_no_artifact_found: warn

      - name: Ensure public directory exists
        run: |
          mkdir -p public
          test -f public/index.html || printf '%s\n' '<h1>AutomateTestPilotAI</h1><p>No reports were published yet.</p>' > public/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
